server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: universe-scout

  datasource:
    url: jdbc:mysql://192.168.37.128:3306/universe_scout?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: zsy
    password: Zsy@2327
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: true

universe:
  file:
    upload-path: D:/universe-scout/uploads
    extract-path: D:/universe-scout/extracted

vision:
  model:
    base-url: http://localhost:9999/mock
    api-key: mock-api-key
    model-name: mock-vision-model
    timeout-seconds: 60